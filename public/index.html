<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #ececec;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #171717;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    background: #19c37d;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 600;
  }
  .tabs {
    display: flex;
    background: #1e1e1e;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    border-radius: 7px;
    border: none;
    background: none;
    color: #8e8ea0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: #2a2a2a;
    color: #ececec;
  }
  .form { display: none; flex-direction: column; gap: 16px; }
  .form.active { display: flex; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: #8e8ea0; }
  .field input {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 14px;
    color: #ececec;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus { border-color: #19c37d; }
  .field input::placeholder { color: #555; }
  .btn {
    background: #19c37d;
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/logo.png" style="width:56px;height:56px;border-radius:16px;object-fit:cover" alt="Nexia">
    <h1>Nexia</h1>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
    <button class="tab" id="tabReg" onclick="switchTab('register')">Criar conta</button>
  </div>

  <div class="error" id="errBox"></div>

  <!-- LOGIN -->
  <div class="form active" id="formLogin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="lSenha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div class="form" id="formReg">
    <div class="field">
      <label>Email</label>
      <input type="email" id="rEmail" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="rSenha" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="rSenha2" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter') register()" />
    </div>
    <button class="btn" id="btnReg" onclick="register()">Criar conta</button>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabReg').classList.toggle('active', tab === 'register');
    document.getElementById('formLogin').classList.toggle('active', tab === 'login');
    document.getElementById('formReg').classList.toggle('active', tab === 'register');
    hideErr();
  }

  function showErr(msg) {
    const el = document.getElementById('errBox');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideErr() {
    document.getElementById('errBox').classList.remove('show');
  }

  async function login() {
    hideErr();
    const email = document.getElementById('lEmail').value.trim();
    const senha = document.getElementById('lSenha').value;
    if (!email || !senha) return showErr('Preencha email e senha.');
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      });
      const data = await res.json();
      if (!res.ok) return showErr(data.error || 'Erro ao entrar.');
      if (data.user.role === 'user') {
        window.location.href = '/chat.html';
      } else {
        window.location.href = '/admin.html';
      }
    } catch (e) {
      showErr('Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  async function register() {
    hideErr();
    const email = document.getElementById('rEmail').value.trim();
    const senha = document.getElementById('rSenha').value;
    const senha2 = document.getElementById('rSenha2').value;
    if (!email || !senha || !senha2) return showErr('Preencha todos os campos.');
    if (senha !== senha2) return showErr('As senhas não coincidem.');
    if (senha.length < 6) return showErr('Senha mínima: 6 caracteres.');
    const btn = document.getElementById('btnReg');
    btn.disabled = true;
    btn.textContent = 'Criando conta...';
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      });
      const data = await res.json();
      if (!res.ok) return showErr(data.error || 'Erro ao criar conta.');
      window.location.href = '/chat.html';
    } catch (e) {
      showErr('Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Criar conta';
    }
  }

  // Se já estiver logado, redireciona
  fetch('/api/me')
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (d && d.email) {
        window.location.href = d.role === 'user' ? '/chat.html' : '/admin.html';
      }
    })
    .catch(() => {});
</script>
</body>
</html>
