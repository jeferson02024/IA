<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia — Assistente de IA</title>

<!-- Open Graph - prévia rica no WhatsApp, Instagram, etc -->
<meta property="og:title" content="Nexia — Assistente de IA 🤖">
<meta property="og:description" content="✨ Venha conhecer a Nexia! A melhor IA disponível, grátis e em português. Converse, gere imagens e muito mais!">
<meta property="og:image" content="https://ia-2-uvqg.onrender.com/logo.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:url" content="https://ia-2-uvqg.onrender.com">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Nexia">

<!-- Twitter/X Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Nexia — Assistente de IA 🤖">
<meta name="twitter:description" content="✨ A melhor IA disponível, grátis e em português!">
<meta name="twitter:image" content="https://ia-2-uvqg.onrender.com/logo.png">

<!-- WhatsApp extra -->
<meta name="description" content="✨ Venha conhecer a Nexia! A melhor IA disponível, grátis e em português.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #ececec;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #171717;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    background: #19c37d;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 600;
  }
  .tabs {
    display: flex;
    background: #1e1e1e;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    border-radius: 7px;
    border: none;
    background: none;
    color: #8e8ea0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: #2a2a2a;
    color: #ececec;
  }
  .form { display: none; flex-direction: column; gap: 16px; }
  .form.active { display: flex; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: #8e8ea0; }
  .field input {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 14px;
    color: #ececec;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus { border-color: #19c37d; }
  .field input::placeholder { color: #555; }
  .btn {
    background: #19c37d;
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
  }
  .error.show { display: block; }
  .divider{display:flex;align-items:center;gap:10px;margin:4px 0;color:var(--muted);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 16px;color:#333;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;margin-top:2px}
  .btn-google:hover{background:#f5f5f5;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .btn-google img{width:20px;height:20px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:380px}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:16px}
  .modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
  .btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer}
  .btn-send{background:var(--accent);border:none;border-radius:8px;padding:8px 18px;color:#000;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/logo.png" style="width:56px;height:56px;border-radius:16px;object-fit:cover" alt="Nexia">
    <h1>Nexia</h1>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
    <button class="tab" id="tabReg" onclick="switchTab('register')">Criar conta</button>
  </div>

  <div class="error" id="errBox"></div>

  <!-- LOGIN -->
  <div class="form active" id="formLogin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="lSenha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <div style="text-align:right;margin-top:-8px"><a href="#" onclick="openForgot()" style="font-size:12px;color:var(--muted);text-decoration:none">Esqueci a senha</a></div>
    <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
    <div class="divider">ou</div>
    <a class="btn-google" href="#" onclick="googleLogin(event)">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      Continuar com Google
    </a>
  </div>

  <!-- CADASTRO -->
  <div class="form" id="formReg">
    <div class="field">
      <label>Email</label>
      <input type="email" id="rEmail" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="rSenha" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="rSenha2" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter') register()" />
    </div>
    <button class="btn" id="btnReg" onclick="register()">Criar conta</button>
    <div class="divider">ou</div>
    <a class="btn-google" href="#" onclick="googleLogin(event)">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      Continuar com Google
    </a>
  </div>
</div>

<div class="overlay" id="forgotOverlay">
  <div class="modal">
    <h3>Esqueci a senha</h3>
    <p>Digite seu email e enviaremos um link para redefinir sua senha.</p>
    <div class="field"><label>Email</label><input type="email" id="forgotEmail" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')sendForgot()"/></div>
    <div id="forgotMsg" style="font-size:13px;display:none;padding:8px 12px;border-radius:8px;margin-top:4px"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeForgot()">Cancelar</button>
      <button class="btn-send" id="btnForgot" onclick="sendForgot()">Enviar link</button>
    </div>
  </div>
</div>

<script>
  // Detecta se está dentro do nosso app Android (WebView)
  function isInOurApp() {
    const ua = navigator.userAgent || '';
    return /wv/.test(ua) || window.Android !== undefined;
  }

  // Detecta in-app browsers de outros apps (Instagram, WhatsApp, etc.)
  function isInAppBrowser() {
    const ua = navigator.userAgent || '';
    return /Instagram|FBAN|FBAV|Twitter|Line|WhatsApp|Snapchat|TikTok/.test(ua);
  }

  // Se veio de outro app (Instagram, WhatsApp...), redireciona pro Chrome
  (function() {
    if (isInAppBrowser()) {
      const url = window.location.href;
      window.location.replace('intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end');
    }
  })();

  function googleLogin(e) {
    e.preventDefault();
    // Se estiver no nosso app → o Android vai interceptar e abrir no Chrome via Custom Tabs
    // Se estiver no navegador → vai direto
    window.location.href = '/auth/google';
  }

  // Mostra erro se veio do Google com falha
  if(new URLSearchParams(location.search).get('error')==='google'){
    const err=document.getElementById('error');
    err.textContent='Erro ao entrar com Google. Tente novamente.';
    err.style.display='block';
  }
  function openForgot(){ document.getElementById('forgotEmail').value=''; document.getElementById('forgotMsg').style.display='none'; document.getElementById('forgotOverlay').classList.add('show'); setTimeout(()=>document.getElementById('forgotEmail').focus(),100); }
  function closeForgot(){ document.getElementById('forgotOverlay').classList.remove('show'); }

  async function sendForgot(){
    const email = document.getElementById('forgotEmail').value.trim();
    const msg = document.getElementById('forgotMsg');
    const btn = document.getElementById('btnForgot');
    if(!email){ msg.style.cssText='display:block;background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)'; msg.textContent='Digite seu email.'; return; }
    btn.textContent='Enviando...'; btn.disabled=true;
    const r = await fetch('/api/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d = await r.json();
    btn.textContent='Enviar link'; btn.disabled=false;
    if(!r.ok){ msg.style.cssText='display:block;background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)'; msg.textContent=d.error; return; }
    msg.style.cssText='display:block;background:rgba(25,195,125,.1);color:#19c37d;border:1px solid rgba(25,195,125,.2)';
    msg.textContent='✅ Link enviado! Verifique seu email.';
    setTimeout(closeForgot, 3000);
  }

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabReg').classList.toggle('active', tab === 'register');
    document.getElementById('formLogin').classList.toggle('active', tab === 'login');
    document.getElementById('formReg').classList.toggle('active', tab === 'register');
    hideErr();
  }

  function showErr(msg) {
    const el = document.getElementById('errBox');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideErr() {
    document.getElementById('errBox').classList.remove('show');
  }

  async function login() {
    hideErr();
    const email = document.getElementById('lEmail').value.trim();
    const senha = document.getElementById('lSenha').value;
    if (!email || !senha) return showErr('Preencha email e senha.');
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      });
      const data = await res.json();
      if (!res.ok) return showErr(data.error || 'Erro ao entrar.');
      if (data.user.role === 'user') {
        window.location.href = '/chat.html';
      } else {
        window.location.href = '/admin.html';
      }
    } catch (e) {
      showErr('Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  async function register() {
    hideErr();
    const email = document.getElementById('rEmail').value.trim();
    const senha = document.getElementById('rSenha').value;
    const senha2 = document.getElementById('rSenha2').value;
    if (!email || !senha || !senha2) return showErr('Preencha todos os campos.');
    if (senha !== senha2) return showErr('As senhas não coincidem.');
    if (senha.length < 6) return showErr('Senha mínima: 6 caracteres.');
    const btn = document.getElementById('btnReg');
    btn.disabled = true;
    btn.textContent = 'Criando conta...';
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: senha })
      });
      const data = await res.json();
      if (!res.ok) return showErr(data.error || 'Erro ao criar conta.');
      window.location.href = '/chat.html';
    } catch (e) {
      showErr('Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Criar conta';
    }
  }

  // Se já estiver logado, redireciona
  fetch('/api/me')
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (d && d.email) {
        window.location.href = d.role === 'user' ? '/chat.html' : '/admin.html';
      }
    })
    .catch(() => {});
  // Load theme
  fetch('/api/theme').then(r=>r.json()).then(t=>{
    const root = document.documentElement;
    root.style.setProperty('--accent', t.accent);
    root.style.setProperty('--bg', t.bg);
    root.style.setProperty('--surface', t.surface);
  }).catch(()=>{});
</script>
</body>
</html>
