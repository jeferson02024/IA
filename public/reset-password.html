<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia — Redefinir Senha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--card:#171717;--border:#2a2a2a;--text:#ececec;--muted:#8e8ea0;--accent:#19c37d}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:18px;font-weight:700}
h2{font-size:20px;font-weight:600;margin-bottom:6px}
p{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:12px;color:var(--muted)}
input{background:#1e1e1e;border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);border:none;border-radius:10px;padding:12px;color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:14px;display:none}
.msg.ok{background:rgba(25,195,125,.1);color:var(--accent);border:1px solid rgba(25,195,125,.2);display:block}
.msg.err{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2);display:block}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">Nexia</span>
  </div>
  <h2>Nova senha</h2>
  <p>Digite sua nova senha abaixo.</p>
  <div class="field"><label>Nova senha</label><input type="password" id="pass1" placeholder="mínimo 6 caracteres"/></div>
  <div class="field"><label>Confirmar senha</label><input type="password" id="pass2" placeholder="repita a senha" onkeydown="if(event.key==='Enter')reset()"/></div>
  <button class="btn" id="btn" onclick="reset()">Salvar nova senha</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="/">← Voltar ao login</a>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('msg').className='msg err'; document.getElementById('msg').textContent='Link inválido.'; document.getElementById('btn').disabled=true; }

async function reset(){
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  if (!pass1||!pass2) { msg.className='msg err'; msg.textContent='Preencha todos os campos.'; return; }
  if (pass1 !== pass2) { msg.className='msg err'; msg.textContent='As senhas não coincidem.'; return; }
  if (pass1.length < 6) { msg.className='msg err'; msg.textContent='Senha mínima: 6 caracteres.'; return; }
  btn.textContent='Salvando...'; btn.disabled=true;
  const r = await fetch('/api/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token, newPassword: pass1}) });
  const d = await r.json();
  if (!r.ok) { msg.className='msg err'; msg.textContent=d.error; btn.textContent='Salvar nova senha'; btn.disabled=false; return; }
  msg.className='msg ok'; msg.textContent='✅ Senha alterada! Redirecionando...';
  setTimeout(()=>location.href='/', 2000);
}
</script>
</body>
</html>
