<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Chat — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--card:#171717;--surface:#1e1e1e;--border:#2a2a2a;--text:#ececec;--muted:#8e8ea0;--accent:#19c37d}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
.logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:16px;font-weight:600}
.badge{background:rgba(25,195,125,.15);color:var(--accent);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.header-email{font-size:12px;color:var(--muted)}
.btn-sm{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:#4a4a4a}
.container{max-width:900px;margin:0 auto;padding:32px 24px;display:flex;flex-direction:column;gap:28px}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.section-title{font-size:14px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--muted)}
input,select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn-primary{background:var(--accent);border:none;border-radius:8px;padding:10px 20px;color:#000;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.btn-secondary:hover{color:var(--text)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:6px 12px;color:#fca5a5;font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.key-info{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.key-dot{width:8px;height:8px;border-radius:50%;background:#6b7280;flex-shrink:0}
.key-dot.on{background:var(--accent)}
.users-table{width:100%;border-collapse:collapse}
.users-table th{text-align:left;font-size:11px;font-weight:500;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.users-table td{padding:12px;border-bottom:1px solid rgba(42,42,42,.5);font-size:13px;vertical-align:middle}
.users-table tr:last-child td{border-bottom:none}
.role-badge{display:inline-block;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}
.role-creator{background:rgba(168,85,247,.15);color:#c084fc}
.role-admin{background:rgba(59,130,246,.15);color:#93c5fd}
.role-user{background:rgba(107,114,128,.15);color:#9ca3af}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;display:none;z-index:999;animation:toastIn .3s ease}
.toast.show{display:block}
.toast.success{border-color:rgba(25,195,125,.4);color:var(--accent)}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;animation:mIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px}
.modal>p{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">🤖</div>
  <h1>IA Chat</h1>
  <span class="badge" id="roleBadge">Admin</span>
  <div class="header-right">
    <span class="header-email" id="headerEmail"></span>
    <button class="btn-sm" onclick="goChat()">💬 Chat</button>
    <button class="btn-sm" onclick="doLogout()">← Sair</button>
  </div>
</header>

<div class="container">

  <!-- Global API Key -->
  <div class="section" id="apiSection">
    <div class="section-title">🔑 API Key Global</div>
    <div class="section-sub">Key usada por todos os usuários que não têm key própria.</div>
    <div class="key-info" id="keyInfo">
      <div class="key-dot" id="keyDot"></div>
      <span id="keyInfoText">Carregando...</span>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Provedor</label>
        <select id="cfgProvider" onchange="updateCfgModels()">
          <option value="groq">Groq (LLaMA)</option>
          <option value="gemini">Google Gemini</option>
        </select>
      </div>
      <div class="field">
        <label>Modelo</label>
        <select id="cfgModel"></select>
      </div>
    </div>
    <div class="field" style="margin-bottom:16px">
      <label>API Key</label>
      <input type="password" id="cfgKey" placeholder="Cole a API key aqui..." />
    </div>
    <button class="btn-primary" onclick="saveConfig()">Salvar configuração</button>
  </div>

  <!-- Users -->
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="section-title">👥 Usuários</div>
      <button class="btn-primary" style="padding:8px 14px;font-size:12px" onclick="openAddUser()">+ Adicionar</button>
    </div>
    <div class="section-sub">Gerencie todos os usuários da plataforma.</div>
    <div style="overflow-x:auto">
      <table class="users-table" id="usersTable">
        <thead><tr><th>Email</th><th>Papel</th><th>Cadastro</th><th>Key própria</th><th>Ações</th></tr></thead>
        <tbody id="usersTbody"><tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Add User Modal -->
<div class="overlay" id="addUserOverlay" onclick="closeOverlay(event,'addUserOverlay')">
  <div class="modal">
    <h3>Adicionar Usuário</h3>
    <p>Crie uma conta para um novo usuário ou administrador.</p>
    <div class="modal-field"><label>Email</label><input type="email" id="newEmail" placeholder="usuario@email.com"/></div>
    <div class="modal-field"><label>Senha</label><input type="password" id="newPass" placeholder="mínimo 6 caracteres"/></div>
    <div class="modal-field" id="roleFieldWrap">
      <label>Papel</label>
      <select id="newRole">
        <option value="user">Usuário</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="document.getElementById('addUserOverlay').classList.remove('show')">Cancelar</button>
      <button class="btn-primary" onclick="addUser()">Criar conta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let me = null;
const groqModels = ['llama-3.3-70b-versatile','llama-3.1-8b-instant','mixtral-8x7b-32768','gemma2-9b-it'];
const geminiModels = ['gemini-1.5-flash','gemini-1.5-flash-8b','gemini-1.5-pro'];

function updateCfgModels() {
  const p = document.getElementById('cfgProvider').value;
  const sel = document.getElementById('cfgModel');
  const models = p === 'groq' ? groqModels : geminiModels;
  sel.innerHTML = models.map(m=>`<option value="${m}">${m}</option>`).join('');
}

async function init() {
  const r = await fetch('/api/me');
  if (r.status === 401) { window.location.href='/'; return; }
  me = await r.json();
  if (me.role === 'user') { window.location.href='/chat.html'; return; }
  document.getElementById('headerEmail').textContent = me.email;
  document.getElementById('roleBadge').textContent = me.role === 'creator' ? '👑 Criador' : '🛡 Admin';
  // Only creator can set global key
  if (me.role !== 'creator') document.getElementById('apiSection').style.display='none';
  updateCfgModels();
  loadConfig();
  loadUsers();
}

async function loadConfig() {
  const r = await fetch('/api/admin/config');
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('keyDot').classList.toggle('on', d.hasKey);
  document.getElementById('keyInfoText').textContent = d.hasKey ? `Key configurada: ${d.keyMasked} (${d.provider})` : 'Nenhuma key configurada';
  if (d.provider) document.getElementById('cfgProvider').value = d.provider;
  updateCfgModels();
  if (d.model) document.getElementById('cfgModel').value = d.model;
}

async function saveConfig() {
  const apiKey = document.getElementById('cfgKey').value.trim();
  const provider = document.getElementById('cfgProvider').value;
  const model = document.getElementById('cfgModel').value;
  if (!apiKey) return toast('Cole a API key.', 'error');
  const r = await fetch('/api/admin/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({apiKey,provider,model}) });
  const d = await r.json();
  if (!r.ok) return toast(d.error, 'error');
  document.getElementById('cfgKey').value = '';
  toast('✅ Configuração salva!', 'success');
  loadConfig();
}

async function loadUsers() {
  const r = await fetch('/api/admin/users');
  const users = await r.json();
  const tbody = document.getElementById('usersTbody');
  if (!users.length) { tbody.innerHTML='<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px">Nenhum usuário.</td></tr>'; return; }
  tbody.innerHTML = users.map(u => {
    const date = new Date(u.created_at*1000).toLocaleDateString('pt-BR');
    const roleClass = `role-${u.role}`;
    const roleLabel = u.role === 'creator' ? '👑 Criador' : u.role === 'admin' ? '🛡 Admin' : '👤 Usuário';
    const canDelete = u.role !== 'creator' && (me.role === 'creator' || u.role === 'user');
    const canPromote = me.role === 'creator' && u.role !== 'creator';
    const actions = [];
    if (canPromote) {
      if (u.role === 'user') actions.push(`<button class="btn-sm" onclick="changeRole(${u.id},'admin')" style="font-size:11px;padding:4px 8px">→ Admin</button>`);
      if (u.role === 'admin') actions.push(`<button class="btn-sm" onclick="changeRole(${u.id},'user')" style="font-size:11px;padding:4px 8px">→ User</button>`);
    }
    if (canDelete) actions.push(`<button class="btn-danger" onclick="deleteUser(${u.id}, '${u.email}')">Remover</button>`);
    return `<tr>
      <td>${u.email}</td>
      <td><span class="role-badge ${roleClass}">${roleLabel}</span></td>
      <td style="color:var(--muted)">${date}</td>
      <td style="color:var(--muted)">${u.personal_provider ? '✅ '+u.personal_provider : '—'}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">${actions.join('')||'—'}</td>
    </tr>`;
  }).join('');
}

function openAddUser() {
  document.getElementById('newEmail').value='';
  document.getElementById('newPass').value='';
  document.getElementById('newRole').value='user';
  document.getElementById('roleFieldWrap').style.display = me.role === 'creator' ? 'flex' : 'none';
  document.getElementById('addUserOverlay').classList.add('show');
}

async function addUser() {
  const email = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('newPass').value;
  const role = document.getElementById('newRole').value;
  if (!email||!password) return toast('Preencha todos os campos.','error');
  const r = await fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password,role}) });
  const d = await r.json();
  if (!r.ok) return toast(d.error,'error');
  document.getElementById('addUserOverlay').classList.remove('show');
  toast('✅ Usuário criado!','success');
  loadUsers();
}

async function changeRole(id, newRole) {
  const r = await fetch(`/api/admin/users/${id}/role`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role:newRole}) });
  const d = await r.json();
  if (!r.ok) return toast(d.error,'error');
  toast('✅ Papel alterado!','success');
  loadUsers();
}

async function deleteUser(id, email) {
  if (!confirm(`Remover ${email}?`)) return;
  const r = await fetch(`/api/admin/users/${id}`, { method:'DELETE' });
  const d = await r.json();
  if (!r.ok) return toast(d.error,'error');
  toast('Usuário removido.','success');
  loadUsers();
}

function closeOverlay(e,id) { if(e.target.id===id) document.getElementById(id).classList.remove('show'); }

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function goChat() { window.location.href='/chat.html'; }
async function doLogout() { await fetch('/api/logout',{method:'POST'}); window.location.href='/'; }

init();
</script>
</body>
</html>
